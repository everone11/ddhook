name: Analyze DingTalk APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'DingTalk APK download URL (direct link)'
        required: true
        type: string
      version_name:
        description: 'DingTalk version name (e.g. 8.3.0)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download jadx
        run: |
          JADX_VERSION=1.5.0
          wget -q "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -O /tmp/jadx.zip
          unzip -q /tmp/jadx.zip -d /tmp/jadx
          chmod +x /tmp/jadx/bin/jadx

      - name: Download DingTalk APK
        run: |
          echo "Downloading DingTalk ${{ inputs.version_name }} APK..."
          wget -q --show-progress "${{ inputs.apk_url }}" -O /tmp/dingtalk.apk
          ls -lh /tmp/dingtalk.apk

      - name: Decompile APK with jadx
        run: |
          echo "Decompiling APK (sources only, no resources)..."
          /tmp/jadx/bin/jadx --deobf --no-res -d /tmp/jadx-out /tmp/dingtalk.apk || true
          echo "Decompilation done. Source files:"
          find /tmp/jadx-out -name "*.java" | wc -l

      - name: Extract hook-relevant class names
        run: |
          OUT=/tmp/class_names_${{ inputs.version_name }}.txt
          echo "=== DingTalk ${{ inputs.version_name }} Hook-Relevant Classes ===" > $OUT
          echo "" >> $OUT

          search_class() {
            local label="$1"
            local pattern="$2"
            echo "--- $label ---" >> $OUT
            find /tmp/jadx-out -name "*.java" -path "*$pattern*" | sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT
            echo "" >> $OUT
          }

          echo "### LauncherApplication candidates" >> $OUT
          grep -r "class LauncherApplication" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### DDApplication candidates" >> $OUT
          grep -r "class DDApplication" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### LightAppRuntime candidates" >> $OUT
          grep -r "class LightAppRuntime" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### initSecurityGuard method location" >> $OUT
          grep -r "initSecurityGuard" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### NewSettingActivity candidates" >> $OUT
          grep -r "class NewSettingActivity\|class.*SettingActivity" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### UserSettingsActivity candidates" >> $OUT
          grep -r "class UserSettingsActivity\|class.*UserSettings" /tmp/jadx-out --include="*.java" -l | \
            sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g' >> $OUT || true
          echo "" >> $OUT

          echo "### setting_msg_notice resource references" >> $OUT
          grep -r "setting_msg_notice" /tmp/jadx-out --include="*.java" | head -20 >> $OUT || true
          echo "" >> $OUT

          echo "### alibaba package top-level structure" >> $OUT
          find /tmp/jadx-out -type d -name "alibaba" | while read dir; do ls "$dir"; done | sort -u | head -30 >> $OUT || true

          cat $OUT

      - name: Upload class names report
        uses: actions/upload-artifact@v4
        with:
          name: class-names-${{ inputs.version_name }}
          path: /tmp/class_names_${{ inputs.version_name }}.txt
          retention-days: 30
