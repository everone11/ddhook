name: Analyze DingTalk APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'DingTalk APK download URL (direct link)'
        required: true
        type: string
      version_name:
        description: 'DingTalk version name (e.g. 8.3.0)'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download jadx
        run: |
          JADX_VERSION=1.5.0
          wget -q "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -O /tmp/jadx.zip
          unzip -q /tmp/jadx.zip -d /tmp/jadx
          chmod +x /tmp/jadx/bin/jadx

      - name: Download DingTalk APK
        run: |
          echo "Downloading DingTalk ${{ inputs.version_name }} APK..."
          wget -q --show-progress "${{ inputs.apk_url }}" -O /tmp/dingtalk.apk
          ls -lh /tmp/dingtalk.apk

      - name: Decompile APK with jadx
        run: |
          echo "Decompiling APK (sources only, no resources)..."
          # --deobf            : activate deobfuscation (rename short obfuscated identifiers)
          # --deobf-use-sourcename : prefer the SourceFile attribute embedded in the bytecode
          #                     as the class name (many ProGuard configs keep it).  This often
          #                     restores names like ConvMsgService / HongBaoManagerImpl so that
          #                     the grep patterns below can find them even in obfuscated builds.
          # When jadx renames a class it also adds a "/* renamed from: com.a.b.c */" comment
          # which is used below to recover the original runtime class name for hooking.
          /tmp/jadx/bin/jadx --deobf --deobf-use-sourcename --no-res \
            -d /tmp/jadx-out /tmp/dingtalk.apk || true
          echo "Decompilation done. Source files:"
          find /tmp/jadx-out -name "*.java" | wc -l

      - name: Extract hook-relevant class names
        run: |
          OUT=/tmp/class_names_${{ inputs.version_name }}.txt
          echo "=== DingTalk ${{ inputs.version_name }} Hook-Relevant Classes ===" > $OUT
          echo "" >> $OUT

          # ── Shared helper: return true if $1 looks like a fully-qualified Java class name.
          # Accepts names like "com.a.B", "com.alibaba.android.rimet.biz.a.b$Inner".
          # Rejects empty strings, names with spaces or slashes, and single-component names.
          is_fqn() {
            [[ "$1" =~ ^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z0-9_\$][a-zA-Z0-9_\$]*)+$ ]]
          }

          # ── Helper: return the ORIGINAL runtime class name for a jadx-decompiled file.
          # jadx --deobf adds a "/* renamed from: com.a.b.c */" comment at the top of every
          # class it renames.  We read that annotation so that the extracted name is the real
          # DEX/runtime name (which is what DingTalkDeepHookPlugin needs for loadClass).
          # Falls back to deriving the name from the file path if no annotation is present.
          get_runtime_class() {
            local file="$1"
            local orig
            orig=$(grep -m1 "renamed from:" "$file" 2>/dev/null \
                   | sed 's|.*renamed from: \([^ */]*\).*|\1|')
            if is_fqn "$orig"; then
              echo "$orig"
            else
              echo "$file" | sed 's|.*/jadx-out/sources/||; s|\.java$||; s|/|.|g'
            fi
          }

          # ── Helper: rewrite a grep match line "relpath/File.java:N:  code" so that the
          # file-path portion reflects the original runtime class path instead of jadx's
          # renamed path.  generate_version_config.py's extract_class_from_method_line()
          # reads the path, so this ensures it gets the real class name.
          rewrite_method_match_line() {
            local line="$1"
            local filepath="${line%%:*}"                          # e.g. com/a/b/File.java
            local fullpath="/tmp/jadx-out/sources/$filepath"
            local orig
            orig=$(grep -m1 "renamed from:" "$fullpath" 2>/dev/null \
                   | sed 's|.*renamed from: \([^ */]*\).*|\1|')
            if is_fqn "$orig"; then
              local origpath
              origpath=$(echo "$orig" | tr '.' '/').java        # com/a/b/c.java
              echo "${line/$filepath/$origpath}"
            else
              echo "$line"
            fi
          }

          echo "### LauncherApplication candidates" >> $OUT
          grep -r "class LauncherApplication" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### DDApplication candidates" >> $OUT
          grep -r "class DDApplication" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### LightAppRuntime candidates" >> $OUT
          grep -r "class LightAppRuntime" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### initSecurityGuard method location" >> $OUT
          grep -r "initSecurityGuard" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### NewSettingActivity candidates" >> $OUT
          grep -r "class NewSettingActivity\|class.*SettingActivity" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### UserSettingsActivity / OneSettingActivity candidates" >> $OUT
          grep -r "class UserSettingsActivity\|class.*UserSettings\|class OneSettingActivity" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### setting_msg_notice resource references" >> $OUT
          grep -r "setting_msg_notice" /tmp/jadx-out --include="*.java" | head -20 >> $OUT || true
          echo "" >> $OUT

          echo "### Anti-recall: message revoke / recall classes (by class name)" >> $OUT
          grep -r "class.*[Rr]evoke\|class.*[Rr]ecall\|class ConvMsgService\|class.*ConvMsg" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### Anti-recall: classes containing revoke/recall METHOD bodies (obfuscation-robust)" >> $OUT
          # Find any class (regardless of name) that declares a method with revoke/recall in its body.
          # This catches obfuscated class names where the method name or string literal reveals intent.
          grep -rl "revoke\|recall\|withdraw\|retract\|unsend" /tmp/jadx-out --include="*.java" | \
            grep -i "com/alibaba/android/rimet\|com/laiwang\|com/aliaba/" | \
            xargs grep -l "void " 2>/dev/null | \
            while IFS= read -r f; do get_runtime_class "$f"; done | head -30 >> $OUT || true
          echo "" >> $OUT

          echo "### Anti-recall: onRevokeMsg / revokeMsg / recall method declarations" >> $OUT
          grep -rn "void onRevokeMsg\|void revokeMsg\|void.*[Rr]evokeMessage\|void process.*[Rr]evoke\|void.*[Rr]ecall" /tmp/jadx-out --include="*.java" | \
            sed 's|.*/jadx-out/sources/||' | \
            while IFS= read -r line; do rewrite_method_match_line "$line"; done | head -30 >> $OUT || true
          echo "" >> $OUT

          echo "### Anti-recall: files with revoke/recall in com.alibaba.android.rimet packages" >> $OUT
          grep -rln "revoke\|recall" /tmp/jadx-out --include="*.java" | \
            grep "com/alibaba/android/rimet\|com/laiwang\|com/aliaba/" | \
            while IFS= read -r f; do get_runtime_class "$f"; done | head -30 >> $OUT || true
          echo "" >> $OUT

          echo "### Red-packet: HongBao / HB manager classes (by class name)" >> $OUT
          grep -r "class.*HongBao\|class.*HongBaoManager\|class.*HbManager\|class.*RedPacket" /tmp/jadx-out --include="*.java" -l | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### Red-packet: classes containing hongbao/redpacket METHOD bodies (obfuscation-robust)" >> $OUT
          # Find any class (regardless of name) that references hongbao/redpacket strings or method names.
          grep -rl "hongbao\|HongBao\|redpacket\|RedPacket\|hbmanager\|onReceiveNew\|grabHb\|openHb" /tmp/jadx-out --include="*.java" | \
            grep -i "com/alibaba/android/rimet\|com/laiwang\|com/aliaba/" | \
            while IFS= read -r f; do get_runtime_class "$f"; done | head -30 >> $OUT || true
          echo "" >> $OUT

          echo "### Red-packet: onReceiveNewHb / onReceiveHongBao / openHongBao methods" >> $OUT
          grep -rn "onReceiveNewHb\|onReceiveHongBao\|openHongBao\|grabHongBao\|receiveHb\|openHb\|grabHb\|onNewHb\|pushHb\|newHb" /tmp/jadx-out --include="*.java" | \
            grep -v "^\s*//" | sed 's|.*/jadx-out/sources/||' | \
            while IFS= read -r line; do rewrite_method_match_line "$line"; done | head -30 >> $OUT || true
          echo "" >> $OUT

          echo "### alibaba package top-level structure" >> $OUT
          find /tmp/jadx-out -type d -name "alibaba" | while read dir; do ls "$dir"; done | sort -u | head -30 >> $OUT || true

          echo "" >> $OUT
          echo "### Virtual location: GMapLocation and LocationProxy candidates" >> $OUT
          grep -r "class GMapLocation\|class LocationProxy\|class.*LocationProxy" /tmp/jadx-out --include="*.java" -l | \
            grep -v "com/amap\|com/alipay" | \
            while IFS= read -r f; do get_runtime_class "$f"; done >> $OUT || true
          echo "" >> $OUT

          echo "### Virtual location: onLocationChanged implementations" >> $OUT
          grep -rn "void onLocationChanged" /tmp/jadx-out --include="*.java" | \
            grep -vE "^\s*//" | \
            grep -v "com/amap\|com/alipay" | \
            sed 's|.*/jadx-out/sources/||' | \
            while IFS= read -r line; do rewrite_method_match_line "$line"; done | head -20 >> $OUT || true
          echo "" >> $OUT

          echo "### Virtual location: getLatitude / getLongitude overrides (DingTalk-specific)" >> $OUT
          grep -rn "@Override" /tmp/jadx-out --include="*.java" -l | \
            xargs grep -l "getLatitude\|getLongitude" 2>/dev/null | \
            grep -v "com/amap\|com/alipay\|android/location" | \
            while IFS= read -r f; do get_runtime_class "$f"; done | head -20 >> $OUT || true
          echo "" >> $OUT

          cat $OUT

      - name: Upload class names report
        uses: actions/upload-artifact@v4
        with:
          name: class-names-${{ inputs.version_name }}
          path: /tmp/class_names_${{ inputs.version_name }}.txt
          retention-days: 30
