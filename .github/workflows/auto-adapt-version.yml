name: Auto-Adapt DingTalk Version

# Triggered automatically when the "Analyze DingTalk APK" workflow completes,
# OR manually via workflow_dispatch (pass the run ID of a previous successful
# "Analyze DingTalk APK" run to skip the 20-minute APK analysis step).
# Downloads the class-names artifact, runs the code-generation script, and
# opens a pull request with the resulting changes.  The "Build Android APK"
# workflow fires automatically on the new PR.

on:
  workflow_run:
    workflows: ["Analyze DingTalk APK"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Run ID of a successful "Analyze DingTalk APK" run'
        required: true
        type: string

jobs:
  adapt:
    # For workflow_run: only proceed when the upstream job actually succeeded.
    # For workflow_dispatch: always proceed (the caller is responsible for
    # providing a valid run ID).
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push the new branch
      pull-requests: write  # open the PR
      actions: read         # cross-workflow artifact download

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the push + PR creation works.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Resolve which upstream run to pull the artifact from.
      # workflow_dispatch supplies source_run_id; workflow_run uses the event.
      - name: Set source run ID
        id: source
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ github.event.inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            echo "html_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "html_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Download the class-names artifact produced by analyze-apk.yml ──────
      - name: Download class-names artifact
        uses: actions/download-artifact@v4
        with:
          # Cross-workflow artifact download requires the run ID and a token.
          run-id: ${{ steps.source.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Match the artifact name pattern: class-names-<version>
          pattern: class-names-*
          path: /tmp/artifacts

      # ── Locate the report file and extract the version name ─────────────────
      - name: Locate report and set version
        id: version
        run: |
          # Each artifact is downloaded into its own subdirectory.
          REPORT=$(find /tmp/artifacts -name "class_names_*.txt" | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No class_names_*.txt report found in downloaded artifacts."
            exit 1
          fi
          # Derive the version name from the file name:
          #   class_names_7.5.0.txt  ->  7.5.0
          BASENAME=$(basename "$REPORT" .txt)
          VERSION="${BASENAME#class_names_}"
          echo "report=$REPORT"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION  (report: $REPORT)"

      # ── Run the code-generation script ──────────────────────────────────────
      - name: Generate version config
        run: |
          python3 scripts/generate_version_config.py \
            "${{ steps.version.outputs.report }}" \
            "${{ steps.version.outputs.version }}"

      # ── Commit changes to a new branch and open a PR ─────────────────────
      - name: Commit and open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="auto-adapt/dingtalk-${VERSION}"
          NORMALIZED="${VERSION//.}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          git add \
            "app/src/main/java/com/sky/xposed/rimet/data/config/RimetConfig${NORMALIZED}.java" \
            "app/src/main/java/com/sky/xposed/rimet/data/VersionManager.java" \
            "app/src/main/java/com/sky/xposed/rimet/plugin/system/DingTalkDeepHookPlugin.java" \
            || true

          if git diff --staged --quiet; then
            echo "No source changes detected — nothing to commit."
            exit 0
          fi

          git commit \
            -m "feat: auto-adapt DingTalk ${VERSION} from APK decompilation" \
            -m "Generated by scripts/generate_version_config.py based on the artifact produced by the 'Analyze DingTalk APK' workflow (run ${{ steps.source.outputs.run_id }})."

          git push origin "$BRANCH"

          # Build the PR body in a temp file to avoid YAML indentation issues.
          {
            echo "## Auto-adaptation for DingTalk ${VERSION}"
            echo ""
            echo "This PR was generated automatically by the **Auto-Adapt DingTalk Version** workflow"
            echo "after the **Analyze DingTalk APK** workflow completed for version \`${VERSION}\`."
            echo ""
            echo "### Changes"
            echo "- \`RimetConfig${NORMALIZED}.java\` — new version-specific class/method mappings"
            echo "- \`VersionManager.java\` — registers \`${VERSION}\` → \`RimetConfig${NORMALIZED}\`"
            echo "- \`DingTalkDeepHookPlugin.java\` — newly discovered candidate classes appended to:"
            echo "  - \`LOCATION_CLASS_CANDIDATES\` (虚拟定位 / virtual location)"
            echo "  - \`RECALL_CLASS_CANDIDATES\` (消息防撤回 / anti-recall)"
            echo "  - \`HONGBAO_CLASS_CANDIDATES\` (抢红包 / red-packet)"
            echo ""
            echo "### Features adapted"
            echo "| Feature | Status |"
            echo "|---|---|"
            echo "| 虚拟定位 (Virtual location) | ✓ GMapLocation / LocationProxy candidates updated |"
            echo "| 消息防撤回 (Anti-recall) | ✓ recall/revoke class candidates updated |"
            echo "| 抢红包 (Red-packet) | ✓ HongBao manager candidates updated |"
            echo ""
            echo "### Build"
            echo "The **Build Android APK** workflow will run automatically on this PR."
            echo "Review the generated config, then merge to produce the final module APK."
            echo ""
            echo "> Source analysis run: ${{ steps.source.outputs.html_url }}"
          } > /tmp/pr_body.md

          # Create PR only when one doesn't already exist for this branch.
          # (gh pr create exits non-zero for permission errors AND for
          #  "already exists", so we check explicitly to surface real failures.)
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --limit 1 \
                          --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Pull request #${EXISTING_PR} for branch '$BRANCH' already exists — skipping creation."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "feat: auto-adapt DingTalk ${VERSION}" \
              --body-file /tmp/pr_body.md
          fi
