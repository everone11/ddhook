name: Auto-Adapt DingTalk Version

# Triggered automatically when the "Analyze DingTalk APK" workflow completes.
# Downloads the class-names artifact, runs the code-generation script, and
# opens a pull request with the resulting changes.  The "Build Android APK"
# workflow fires automatically on the new PR.

on:
  workflow_run:
    workflows: ["Analyze DingTalk APK"]
    types:
      - completed

jobs:
  adapt:
    # Only run when the analysis actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push the new branch
      pull-requests: write  # open the PR
      actions: read         # cross-workflow artifact download

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the push + PR creation works.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Download the class-names artifact produced by analyze-apk.yml ──────
      - name: Download class-names artifact
        uses: actions/download-artifact@v4
        with:
          # Cross-workflow artifact download requires the run ID and a token.
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Match the artifact name pattern: class-names-<version>
          pattern: class-names-*
          path: /tmp/artifacts

      # ── Locate the report file and extract the version name ─────────────────
      - name: Locate report and set version
        id: version
        run: |
          # Each artifact is downloaded into its own subdirectory.
          REPORT=$(find /tmp/artifacts -name "class_names_*.txt" | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No class_names_*.txt report found in downloaded artifacts."
            exit 1
          fi
          # Derive the version name from the file name:
          #   class_names_7.5.0.txt  ->  7.5.0
          BASENAME=$(basename "$REPORT" .txt)
          VERSION="${BASENAME#class_names_}"
          echo "report=$REPORT"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION  (report: $REPORT)"

      # ── Run the code-generation script ──────────────────────────────────────
      - name: Generate version config
        run: |
          python3 scripts/generate_version_config.py \
            "${{ steps.version.outputs.report }}" \
            "${{ steps.version.outputs.version }}"

      # ── Commit changes to a new branch and open a PR ─────────────────────
      - name: Commit and open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="auto-adapt/dingtalk-${VERSION}"
          NORMALIZED="${VERSION//.}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          git add \
            "app/src/main/java/com/sky/xposed/rimet/data/config/RimetConfig${NORMALIZED}.java" \
            "app/src/main/java/com/sky/xposed/rimet/data/VersionManager.java" \
            "app/src/main/java/com/sky/xposed/rimet/plugin/system/DingTalkDeepHookPlugin.java" \
            || true

          if git diff --staged --quiet; then
            echo "No source changes detected — nothing to commit."
            exit 0
          fi

          git commit -m "feat: auto-adapt DingTalk ${VERSION} from APK decompilation

Generated by scripts/generate_version_config.py based on the artifact
produced by the 'Analyze DingTalk APK' workflow (run ${{ github.event.workflow_run.id }})."

          git push origin "$BRANCH"

          # Create PR (idempotent: gh pr create exits 0 if PR already exists)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: auto-adapt DingTalk ${VERSION}" \
            --body "## Auto-adaptation for DingTalk ${VERSION}

This PR was generated automatically by the **Auto-Adapt DingTalk Version** workflow
after the **Analyze DingTalk APK** workflow completed for version \`${VERSION}\`.

### Changes
- \`RimetConfig${NORMALIZED}.java\` — new version-specific class/method mappings
- \`VersionManager.java\` — registers \`${VERSION}\` → \`RimetConfig${NORMALIZED}\`
- \`DingTalkDeepHookPlugin.java\` — newly discovered candidate classes appended to:
  - \`LOCATION_CLASS_CANDIDATES\` (虚拟定位 / virtual location)
  - \`RECALL_CLASS_CANDIDATES\` (消息防撤回 / anti-recall)
  - \`HONGBAO_CLASS_CANDIDATES\` (抢红包 / red-packet)

### Features adapted
| Feature | Status |
|---|---|
| 虚拟定位 (Virtual location) | ✓ GMapLocation / LocationProxy candidates updated |
| 消息防撤回 (Anti-recall) | ✓ recall/revoke class candidates updated |
| 抢红包 (Red-packet) | ✓ HongBao manager candidates updated |

### Build
The **Build Android APK** workflow will run automatically on this PR.
Review the generated config, then merge to produce the final module APK.

> Source analysis run: ${{ github.event.workflow_run.html_url }}" \
            || echo "PR already exists or creation skipped."
